set -g status-left-length 100

# setw -g mode-mouse on
# set -g mouse-select-pane on
set-option -g mouse on

set-option -g renumber-windows on

bind c new-window -c "#{pane_current_path}"

# Borrowed from https://www.reddit.com/r/tmux/comments/1gmvgzj/open_new_tmux_splits_in_the_same_directory/
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Borrowed from https://koenwoortman.com/tmux-start-numbering-windows-from-index-one/

# Start numbering windows from index 1
set -g base-index 1

# Start numbering panes from index 1
setw -g pane-base-index 1

set -g set-titles on
set -g set-titles-string '#S'

if-shell '[ -f ~/.tmux/plugins/tpm/tpm ]' \
  "run '~/.tmux/plugins/tpm/tpm'" \
  "if-shell '[ -f /opt/homebrew/opt/tpm/share/tpm/tpm ]' \"run '/opt/homebrew/opt/tpm/share/tpm/tpm'\""

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

run 'test ! -d ~/.tmux/plugins/tmux-window-name && TMUX_PLUGIN_MANAGER_PATH="$HOME/.tmux/plugins/" /opt/homebrew/opt/tpm/share/tpm/bin/install_plugins'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_shells "['zsh', 'bash', 'sh']"

